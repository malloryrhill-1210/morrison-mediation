<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morrison Mediation</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Livvic:ital,wght@0,100;0,300;0,400;0,700;1,300;1,400&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="static/styles.css" />
  </head>

  <body>
    <div id="header"></div>

    <section class="contact">
      <h2>Contact</h2>
      <p class="contact-intro">
        Reach out to schedule a consultation or ask any questions. Pleaes share
        your information and reason for inquiry in your request and Sarah will
        follow up with you about your mediation request.
      </p>

      <div class="contact-item">
        <i class="fas fa-envelope"></i>
        <div>
          <p class="label">Email</p>
          <a href="mailto:sarahmorrisonadr@gmail.com"
            >sarahmorrisonadr@gmail.com</a
          >
        </div>
      </div>

      <div class="contact-item">
        <i class="fas fa-phone"></i>
        <div>
          <p class="label">Phone</p>
          <a href="tel:+18184142914">(818) 414-2914</a>
        </div>
      </div>
    </section>

    <div id="footer"></div>

    <script>
      fetch("header.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("header").innerHTML = data;
        });

      fetch("footer.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("footer").innerHTML = data;
        });
    </script>
  </body>
</html>
