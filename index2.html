<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1,  minimum-scale=5.0,"
    />
    <title>Morrison Mediation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Livvic:ital,wght@0,100;0,300;0,400;0,700;1,300;1,400&display=swap"
      rel="stylesheet"
    />
    <link

  </head>
  <body>
    <div id="header">
      <script>
        // Load CSS
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = "static/styles.css";
        document.head.appendChild(link);

        // Load header
        fetch("header.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("header").innerHTML = data;
          });
      </script>
    </div>


    
    <div class="big_section"></div>
    <div id="footer">
      <script>
        link.rel = "stylesheet";
        link.href = "static/styles.css";
        fetch("footer.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("footer").innerHTML = data;
          });
      </script>
    </div>
  </body>
</html>
